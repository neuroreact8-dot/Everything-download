<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
        @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-gray-900 text-white font-sans">

    <div class="container mx-auto px-4 py-16 max-w-2xl">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-bold mb-2">🚀 All-in-One Downloader</h1>
            <p class="text-gray-400">Download from YouTube, FB, Instagram & more</p>
        </div>

        <div class="bg-gray-800 p-6 rounded-lg shadow-xl">
            <input type="text" id="videoUrl" placeholder="Paste link here (YouTube, FB, etc.)..." 
                   class="w-full p-4 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 mb-4">
            
            <button onclick="downloadVideo()" id="btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded transition">
                Analyze & Download
            </button>
        </div>

        <!-- Result Section -->
        <div id="result" class="mt-8 hidden bg-gray-800 p-6 rounded-lg shadow-xl text-center">
            <p id="videoTitle" class="font-bold mb-4"></p>
            <div id="downloadOptions" class="flex flex-col gap-3">
                <!-- Buttons will appear here -->
            </div>
        </div>

        <!-- Loading -->
        <div id="loading" class="mt-8 hidden flex justify-center">
            <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12"></div>
        </div>
    </div>

    <script>
        async function downloadVideo() {
            const url = document.getElementById('videoUrl').value;
            const btn = document.getElementById('btn');
            const resultDiv = document.getElementById('result');
            const loading = document.getElementById('loading');
            const downloadOptions = document.getElementById('downloadOptions');

            if (!url) { alert("Please paste a link!"); return; }

            // Show Loading
            loading.classList.remove('hidden');
            resultDiv.classList.add('hidden');
            btn.disabled = true;

            try {
                // Hum Cobalt API use kar rahe hain jo sabse best aur free hai
                const response = await fetch('https://api.cobalt.tools/api/json', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify({
                        url: url,
                        vQuality: "720"
                    })
                });

                const data = await response.json();

                if (data.status === 'stream' || data.url) {
                    loading.classList.add('hidden');
                    resultDiv.classList.remove('hidden');
                    downloadOptions.innerHTML = `
                        <a href="${data.url}" target="_blank" class="bg-green-600 p-3 rounded font-bold hover:bg-green-700">
                            Download Now (High Quality)
                        </a>
                    `;
                    document.getElementById('videoTitle').innerText = "Video Ready!";
                } else {
                    alert("Error: Video not found or link not supported.");
                }
            } catch (error) {
                console.error(error);
                alert("Server busy! Try again in 2 minutes.");
            } finally {
                loading.classList.add('hidden');
                btn.disabled = false;
            }
        }
    </script>
</body>
  </html>
