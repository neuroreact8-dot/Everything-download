<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Video Downloader</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700">
        <h1 class="text-3xl font-extrabold text-center mb-6 text-blue-400">Video Downloader</h1>
        
        <p class="text-sm text-gray-400 mb-4 text-center">Paste YouTube, FB or Insta link below:</p>
        
        <input type="text" id="urlInput" placeholder="https://..." 
               class="w-full p-4 bg-slate-700 border border-slate-600 rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
        
        <button onclick="startDownload()" id="mainBtn" 
                class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-lg font-bold transition-all shadow-lg">
            Download Video
        </button>

        <div id="status" class="hidden mt-6 text-center">
            <div id="loader" class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
            <p id="msg" class="text-yellow-400">Analyzing link...</p>
        </div>

        <div id="result" class="hidden mt-6">
            <a id="dlLink" href="#" target="_blank" 
               class="block w-full bg-green-600 hover:bg-green-700 text-center py-4 rounded-xl font-black text-xl shadow-inner uppercase tracking-wider">
               ✅ Click to Save Video
            </a>
            <p class="text-[10px] text-gray-500 mt-2 text-center">If video plays, click three dots and 'Download'</p>
        </div>
    </div>

    <script>
        async function startDownload() {
            const url = document.getElementById('urlInput').value;
            const msg = document.getElementById('msg');
            const status = document.getElementById('status');
            const result = document.getElementById('result');
            const mainBtn = document.getElementById('mainBtn');

            if(!url) { alert("Please paste a link!"); return; }

            // Show Loading
            status.classList.remove('hidden');
            result.classList.add('hidden');
            mainBtn.disabled = true;
            mainBtn.style.opacity = "0.5";
            msg.innerText = "Connecting to Server...";

            try {
                // Using a more stable public proxy
                const apiURL = `https://downloader.freemake.com/api/get-video-info?url=${encodeURIComponent(url)}`;
                
                // Hum direct ek universal downloader service ko redirect kar rahe hain jo 100% work karegi
                // Kyunki GitHub se direct API calls block ho jati hain
                setTimeout(() => {
                    // Redirecting to a stable processing engine
                    window.location.href = `https://en.savefrom.net/1-youtube-video-downloader-524.html?url=${url}`;
                }, 1500);

            } catch (err) {
                msg.innerText = "Error! Trying Backup...";
                window.open(`https://y2mate.is/analyze?url=${url}`, '_blank');
            }
        }
    </script>
</body>
</html>
