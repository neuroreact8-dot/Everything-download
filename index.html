<!DOCTYPE html>
<html>
<head>
<title>Everything Download</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0F1117;color:#F1F2F6;font-family:Arial,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;text-align:center;padding:20px;}
.box{max-width:500px;}
h1{font-size:36px;margin-bottom:12px;}
h1 span{color:#4F8EF7;}
p{color:#8B8FA8;font-size:16px;margin-bottom:20px;line-height:1.6;}
.btn{display:inline-block;background:linear-gradient(135deg,#4F8EF7,#7C5CFC);color:white;padding:14px 32px;border-radius:10px;font-size:16px;font-weight:bold;text-decoration:none;border:none;cursor:pointer;}
.status{margin-top:30px;padding:16px;background:#181B25;border:1px solid #2A2D3E;border-radius:10px;}
.green{color:#22C55E;font-weight:bold;font-size:18px;}
</style>
</head>
<body>
<div class="box">
<h1>Everything <span>Download</span></h1>
<p>Free Video Downloader - YouTube, Instagram, TikTok, Facebook and 50+ sites</p>
<button class="btn" onclick="alert('Website is working! Full version coming soon!')">Test Button</button>
<div class="status">
<p class="green">Website is LIVE!</p>
<p style="color:#8B8FA8;font-size:14px;margin-top:8px;">GitHub Pages working correctly</p>
</div>
</div>
</body>
</html>
